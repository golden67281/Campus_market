spring.application.name=campus-market-server

# Port
server.port=${PORT:5000}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:mongodb://localhost:27017/campus_market}}


# JWT Secret
jwt.secret=${JWT_SECRET:campus_market_super_secure_secret_token_key_123}

# Cloudinary Config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Email Configuration (Spring Mail)
# Supports SMTP relay (Gmail by default, Brevo if configured)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:${GMAIL_USER:}}
spring.mail.password=${SMTP_PASS:${GMAIL_APP_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Custom property for sender email
app.mail.sender=${SMTP_SENDER:${SMTP_USER:${GMAIL_USER:campusmarket.app@gmail.com}}}

# File upload properties (max size 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
